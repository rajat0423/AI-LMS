name: Uptime Monitor & Keep Alive

on:
  schedule:
    # Run every 5 minutes (maximum frequency allowed by GitHub Actions cron)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ping:
    name: Ping Render Backend
    runs-on: ubuntu-latest
    steps:
      - name: First Ping
        run: |
          echo "Pinging backend at https://ai-lms-a9f4.onrender.com/ping..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://ai-lms-a9f4.onrender.com/ping)
          echo "HTTP Status Code: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 301 ] || [ "$RESPONSE" -eq 302 ] || [ "$RESPONSE" -eq 307 ] || [ "$RESPONSE" -eq 308 ]; then
            echo "✅ Backend is awake!"
          else
            echo "⚠️ Backend returned HTTP status $RESPONSE"
          fi

      - name: Sleep 150 seconds
        run: sleep 150

      - name: Second Ping
        run: |
          echo "Pinging backend at https://ai-lms-a9f4.onrender.com/ping again..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://ai-lms-a9f4.onrender.com/ping)
          echo "HTTP Status Code: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 301 ] || [ "$RESPONSE" -eq 302 ] || [ "$RESPONSE" -eq 307 ] || [ "$RESPONSE" -eq 308 ]; then
            echo "✅ Backend is awake!"
          else
            echo "❌ Backend returned HTTP status $RESPONSE"
            exit 1
          fi
