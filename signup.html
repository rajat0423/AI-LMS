<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signup Form</title>
    <style>
        body {
            background-color: aqua;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #7db580;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            height: 370px;
            padding: 30px 25px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            background-color: #eee;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #00e600;
            border-radius: 5px;
            border: none;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <form>
            <label style="font-size: 16px;">Name</label><br>
            <input type="text" placeholder="enter your name"><br>
            <label style="font-size: 16px;">Email</label><br>
            <input type="email" placeholder="enter your email"><br>
            <label style="font-size: 16px;">Password</label><br>
            <input type="password" placeholder="enter your password"><br>
            <label style="font-size: 16px;">Confirm Password</label><br>
            <input type="password" placeholder="confirm your password"><br>
            <label style="font-size: 16px;">Phone Number</label><br>
            <input type="tel" placeholder="enter your phone number"><br>
            <button style="background-color: green;" position="absolute" left="50%">Submit</button>
        </form>
    </div>


</body>

</html>
